.theme-dark,
.theme-light {
    --git-delete-bg: #ff475040;
    --git-delete-hl: #96050a75;
    --git-insert-bg: #68d36840;
    --git-insert-hl: #23c02350;
    --git-change-bg: #ffd55840;
    --git-selected: #3572b0;

    --git-delete: #c33;
    --git-insert: #399839;
    --git-change: #d0b44c;
    --git-move: #3572b0;
}

.git-diff {
    .d2h-d-none {
        display: none;
    }
    .d2h-wrapper {
        text-align: left;
        border-radius: 0.25em;
        overflow: auto;
    }
    .d2h-file-header.d2h-file-header {
        background-color: var(--background-secondary);
        border-bottom: 1px solid var(--background-modifier-border);
        font-family:
            Source Sans Pro,
            Helvetica Neue,
            Helvetica,
            Arial,
            sans-serif;
        height: 35px;
        padding: 5px 10px;
    }
    .d2h-file-header,
    .d2h-file-stats {
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
    }
    .d2h-file-header {
        display: none;
    }
    .d2h-file-stats {
        font-size: 14px;
        margin-left: auto;
    }
    .d2h-lines-added {
        border: 1px solid var(--color-green);
        border-radius: 5px 0 0 5px;
        color: var(--color-green);
        padding: 2px;
        text-align: right;
        vertical-align: middle;
    }
    .d2h-lines-deleted {
        border: 1px solid var(--color-red);
        border-radius: 0 5px 5px 0;
        color: var(--color-red);
        margin-left: 1px;
        padding: 2px;
        text-align: left;
        vertical-align: middle;
    }
    .d2h-file-name-wrapper {
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        font-size: 15px;
        width: 100%;
    }
    .d2h-file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text-normal);
        font-size: var(--h5-size);
    }
    .d2h-file-wrapper {
        border: 1px solid var(--background-secondary-alt);
        border-radius: 3px;
        margin-bottom: 1em;
        max-height: 100%;
    }
    .d2h-file-collapse {
        -webkit-box-pack: end;
        -ms-flex-pack: end;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        border: 1px solid var(--background-secondary-alt);

        cursor: pointer;
        display: none;
        font-size: 12px;
        justify-content: flex-end;
        padding: 4px 8px;
    }
    .d2h-file-collapse.d2h-selected {
        background-color: var(--git-selected);
    }
    .d2h-file-collapse-input {
        margin: 0 4px 0 0;
    }
    .d2h-diff-table {
        border-collapse: collapse;
        font-family: var(--font-monospace);
        font-size: var(--code-size);
        width: 100%;
    }
    .d2h-files-diff {
        width: 100%;
    }
    .d2h-file-diff {
        /*
		overflow-y: scroll;
		*/
        border-radius: 5px;
        font-size: var(--font-text-size);
        line-height: var(--line-height-normal);
    }
    .d2h-file-side-diff {
        display: inline-block;
        margin-bottom: -8px;
        margin-right: -4px;
        overflow-x: scroll;
        overflow-y: hidden;
        width: 50%;
    }
    .d2h-code-line {
        padding-left: 6em;
        padding-right: 1.5em;
    }
    .d2h-code-line,
    .d2h-code-side-line {
        display: inline-block;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        white-space: nowrap;
        width: 100%;
    }
    .d2h-code-side-line {
        /* needed to be changed */
        padding-left: 0.5em;
        padding-right: 0.5em;
    }
    .d2h-code-line-ctn {
        word-wrap: normal;
        background: none;
        display: inline-block;
        padding: 0;
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
        vertical-align: middle;
        width: 100%;
        /* only works for line-by-line */
        white-space: pre-wrap;
    }
    .d2h-code-line del,
    .d2h-code-side-line del {
        background-color: var(--git-delete-hl);
        color: var(--text-normal);
    }
    .d2h-code-line del,
    .d2h-code-line ins,
    .d2h-code-side-line del,
    .d2h-code-side-line ins {
        border-radius: 0.2em;
        display: inline-block;
        margin-top: -1px;
        text-decoration: none;
        vertical-align: middle;
    }
    .d2h-code-line ins,
    .d2h-code-side-line ins {
        background-color: var(--git-insert-hl);
        text-align: left;
    }
    .d2h-code-line-prefix {
        word-wrap: normal;
        background: none;
        display: inline;
        padding: 0;
        white-space: pre;
    }
    .line-num1 {
        float: left;
    }
    .line-num1,
    .line-num2 {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        overflow: hidden;
        /*
		padding: 0 0.5em;
		*/
        text-overflow: ellipsis;
        width: 2.5em;
        padding-left: 0;
    }
    .line-num2 {
        float: right;
    }
    .d2h-code-linenumber {
        background-color: var(--background-primary);
        border: solid var(--background-modifier-border);
        border-width: 0 1px;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        color: var(--text-faint);
        cursor: pointer;
        display: inline-block;
        position: absolute;
        text-align: right;
        width: 5.5em;
    }
    .d2h-code-linenumber:after {
        content: "\200b";
    }
    .d2h-code-side-linenumber {
        background-color: var(--background-primary);
        border: solid var(--background-modifier-border);
        border-width: 0 1px;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        color: var(--text-faint);
        cursor: pointer;
        overflow: hidden;
        padding: 0 0.5em;
        text-align: right;
        text-overflow: ellipsis;
        width: 4em;
        /* needed to be changed */
        display: table-cell;
        position: relative;
    }
    .d2h-code-side-linenumber:after {
        content: "\200b";
    }
    .d2h-code-side-emptyplaceholder,
    .d2h-emptyplaceholder {
        background-color: var(--background-primary);
        border-color: var(--background-modifier-border);
    }
    .d2h-code-line-prefix,
    .d2h-code-linenumber,
    .d2h-code-side-linenumber,
    .d2h-emptyplaceholder {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }
    .d2h-code-linenumber,
    .d2h-code-side-linenumber {
        direction: rtl;
    }
    .d2h-del {
        background-color: var(--git-delete-bg);
        border-color: var(--git-delete-hl);
    }
    .d2h-ins {
        background-color: var(--git-insert-bg);
        border-color: var(--git-insert-hl);
    }
    .d2h-info {
        background-color: var(--background-primary);
        border-color: var(--background-modifier-border);
        color: var(--text-faint);
    }
    .d2h-del,
    .d2h-ins,
    .d2h-file-diff .d2h-change {
        color: var(--text-normal);
    }
    .d2h-file-diff .d2h-del.d2h-change {
        background-color: var(--git-change-bg);
    }
    .d2h-file-diff .d2h-ins.d2h-change {
        background-color: var(--git-insert-bg);
    }
    .d2h-file-list-wrapper {
        a {
            text-decoration: none;
            cursor: default;
            -webkit-user-drag: none;
        }

        svg {
            display: none;
        }
    }
    .d2h-file-list-header {
        text-align: left;
    }
    .d2h-file-list-title {
        display: none;
    }
    .d2h-file-list-line {
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        text-align: left;
    }
    .d2h-file-list {
    }
    .d2h-file-list > li {
        border-bottom: 1px solid var(--background-modifier-border);
        margin: 0;
        padding: 5px 10px;
    }
    .d2h-file-list > li:last-child {
        border-bottom: none;
    }
    .d2h-file-switch {
        cursor: pointer;
        display: none;
        font-size: 10px;
    }
    .d2h-icon {
        fill: currentColor;
        margin-right: 10px;
        vertical-align: middle;
    }
    .d2h-deleted {
        color: var(--git-delete);
    }
    .d2h-added {
        color: var(--git-insert);
    }
    .d2h-changed {
        color: var(--git-change);
    }
    .d2h-moved {
        color: var(--git-move);
    }
    .d2h-tag {

    .d2h-changed-tag {

    }

    /* needed for line-by-line*/

    .d2h-diff-tbody {
        position: relative;
    }

/* ====================== Line Authoring Information ====================== */

.cm-gutterElement.obs-git-blame-gutter {
    /* Add background color to spacing inbetween and around the gutter for better aesthetics */
    border-width: 0px 2px 0.2px 2px;
    border-style: solid;
    border-color: var(--background-secondary);
    background-color: var(--background-secondary);
}

.cm-gutterElement.obs-git-blame-gutter > div,
.line-author-settings-preview {
    /* delegate text color to settings */
    color: var(--obs-git-gutter-text);
    font-family: monospace;
    height: 100%; /* ensure, that age-based background color occupies entire parent */
    text-align: right;
    padding: 0px 6px 0px 6px;
    white-space: pre; /* Keep spaces and do not collapse them. */
}

@media (max-width: 800px) {
    /* hide git blame gutter not to superpose text */
    .cm-gutterElement.obs-git-blame-gutter {
        display: none;
    }
}

/* Override styling of Codemirror merge view "collapsed lines" indicator */
.git-split-diff-view .ͼ2 .cm-collapsedLines {
    background: var(--interactive-normal);
    border-radius: var(--radius-m);
    color: var(--text-accent);
    font-size: var(--font-small);
    padding: var(--size-4-1) var(--size-4-1);
}
.git-split-diff-view .ͼ2 .cm-collapsedLines:hover {
    background: var(--interactive-hover);
    color: var(--text-accent-hover);
}

.git-signs-gutter {
    .cm-gutterElement {
        display: grid;
    }
}

.git-gutter-marker:hover {
    border-radius: 2px;
}

.git-gutter-marker.git-add {
    background-color: var(--color-green);
    justify-self: center;
    height: inherit;
    width: 0.2rem;
}

.git-gutter-marker.git-change {
    background-color: var(--color-yellow);
    justify-self: center;
    height: inherit;
    width: 0.2rem;
}

.git-gutter-marker.git-changedelete {
    color: var(--color-yellow);
    font-weight: var(--font-bold);
    font-size: 1rem;
    justify-self: center;
    height: inherit;
}

.git-gutter-marker.git-delete {
    background-color: var(--color-red);
    height: 0.2rem;
    width: 0.8rem;
    align-self: end;
}

.git-gutter-marker.git-topdelete {
    background-color: var(--color-red);
    height: 0.2rem;
    width: 0.8rem;
    align-self: start;
}

div:hover > .git-gutter-marker.git-change {
    width: 0.6rem;
}

div:hover > .git-gutter-marker.git-add {
    width: 0.6rem;
}

div:hover > .git-gutter-marker.git-delete {
    height: 0.6rem;
}

div:hover > .git-gutter-marker.git-topdelete {
    height: 0.6rem;
}

div:hover > .git-gutter-marker.git-changedelete {
    font-weight: var(--font-bold);
}

.git-gutter-marker.staged {
    opacity: 0.5;
}

.git-diff {
    .cm-merge-revert {
        width: 4em;
    }
    /* Ensure that merge revert markers are positioned correctly */
    .cm-merge-revert > * {
        position: absolute;
        background-color: var(--background-secondary);
        display: flex;
    }
}

/* Prevent shifting of the editor when git signs gutter is the only gutter present */
.cm-gutters.cm-gutters-before:has(> .git-signs-gutter:only-child) {
    margin-inline-end: 0;
    .git-signs-gutter {
        margin-inline-start: -1rem;
    }
}

.git-changes-status-bar-colored {
    .git-add {
        color: var(--color-green);
    }
    .git-change {
        color: var(--color-yellow);
    }
    .git-delete {
        color: var(--color-red);
    }
}

.git-changes-status-bar .git-add {
    margin-right: 0.3em;
}

.git-changes-status-bar .git-change {
    margin-right: 0.3em;

 .style-settings-heading {
    cursor: pointer;
    margin-bottom: 18px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--background-modifier-border);
}

.style-settings-heading[data-level="0"] {
    margin-bottom: 26px;
}

.style-settings-container {
    padding-bottom: 16px;
}

.style-settings-heading[data-level="0"] + .style-settings-container {
    padding-left: 34px;
}

.style-settings-heading.is-collapsed {
    margin-bottom: 0;
}

.style-settings-heading.is-collapsed + .style-settings-container {
    display: none;
}

.style-settings-collapse-indicator {
    color: var(--text-faint);
    display: inline-block;
    margin-right: 8px;
    position: relative;
    top: -1px;
}

.style-settings-heading[data-level="0"]
+ .style-settings-container
.style-settings-collapse-indicator {
    margin-left: -17px;
}

.style-settings-collapse-indicator > svg {
    height: 9px;
    width: 9px;
}

.style-settings-heading.is-collapsed .style-settings-collapse-indicator > svg {
    transform: rotate(-90deg);
}

.style-settings-filter-result-count {
    color: var(--text-faint);
    line-height: var(--line-height-tight);
    margin-inline: var(--size-4-2);
}

.style-settings-error {
    font-size: 14px;
    border-radius: 6px;
    background: rgba(var(--background-modifier-error-rgb), 0.2);
    color: var(--text-error);
    padding: 10px;
    margin-bottom: 1rem;
}

.style-settings-error-name {
    font-weight: bold;
    margin-bottom: 5px;
}

.style-settings-error-desc {
    white-space: pre;
}

.style-settings-empty {
    font-size: 14px;
    background: var(--background-secondary);
    padding: 10px;
}

.style-settings-empty-name {
    font-weight: bold;
    margin-bottom: 5px;
}

.style-settings-import-input {
    width: 0.1px;
    height: 0.1px;
    opacity: 0;
    overflow: hidden;
    position: absolute;
    z-index: -1;
}

.style-settings-import-label {
    cursor: pointer;
    color: var(--text-accent);
    text-decoration: underline;
}

.style-settings-import-label:hover {
    color: var(--text-accent-hover);
}

.style-settings-export,
.style-settings-import {
    display: inline-block;
    margin-right: 10px;
}

.style-settings-copy,
.style-settings-download {
    position: relative;
    display: inline-block;
    margin-left: 10px;
}

.style-settings-copy:before {
    color: var(--interactive-success);
    content: "✓";
    position: absolute;
    left: -18px;
    font-weight: bold;
    opacity: 0;
    transition: 150ms opacity ease-in-out;
}

.style-settings-copy.success:before {
    opacity: 1;
}

.modal-style-settings {
    height: 70vh;
    display: flex;
    flex-direction: column;
}

.modal-style-settings .modal-content {
    flex-grow: 1;
    margin: 0;
    display: flex;
    flex-direction: column;
}

.modal-style-settings textarea {
    display: block;
    width: 100%;
    height: 100%;
    font-family: var(--font-monospace) !important;
    font-size: 12px;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: scroll;
    margin-bottom: 5px;
}

.modal-style-settings .setting-item {
    align-items: flex-start;
}

.modal-style-settings button {
    margin: 10px 0 0;
}

.style-settings-import-error {
    display: none;
    color: var(--text-error);
}

.style-settings-import-error.active {
    display: block;
}

.view-content .style-settings-container .setting-item:not(.setting-item-heading) {
    flex-direction: column;
    align-items: flex-start;
}

.view-content .style-settings-container .setting-item:not(.setting-item-heading) .setting-item-control {
    padding-top: 0.5em;
}

.view-content .style-settings-container .setting-item:not(.setting-item-heading) .themed-color-wrapper {
    display: flex;
}

.style-settings-ref {
    position: absolute;
    width: 0 !important;
    height: 0 !important;
    pointer-events: none;
}

.style-settings-info-text .style-settings-markdown :first-child {
    margin-top: 0;
}

.style-settings-info-text .style-settings-markdown :last-child {
    margin-bottom: 0;
}.style-settings-container .pcr-app {
    display: none;
}

.style-settings-container .pcr-app.visible {
    display: flex;
}

.pcr-app .pcr-swatches > button {
    padding: 0;
}

.pickr .pcr-button {
    margin-right: 0;
}

.themed-color-wrapper > div {
    background: var(--background-primary);
    padding: 10px;
    display: flex;
    align-items: center;
    border-radius: 4px;
}

.themed-color-wrapper > div + div {
    margin-top: 6px;
}

.themed-color-wrapper button {
    display: block;
}

.themed-color-wrapper .pickr-reset > button {
    margin: 0 0 0 10px;
    padding: 9px;
    line-height: 1;
}

.themed-color-wrapper .pickr-reset > button > svg {
    display: block;
}
